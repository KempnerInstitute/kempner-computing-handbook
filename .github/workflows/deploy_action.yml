name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        enable-cache: true
        python-version: '3.12'

    - name: Build the book
      run: |
        rm -rf kempner_computing_handbook/_build
        uv run jupyter-book build kempner_computing_handbook

    - name: Preserve custom domain in artifact
      run: echo "handbook.eng.kempnerinstitute.harvard.edu" > kempner_computing_handbook/_build/html/CNAME

    - uses: actions/configure-pages@v6

    - uses: actions/upload-pages-artifact@v5
      with:
        path: kempner_computing_handbook/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - id: deployment
      uses: actions/deploy-pages@v5
