name: Check for build (Ubuntu)


on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_ubuntu:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        # Full history so sphinx-last-updated-by-git can read each page's commit date.
        fetch-depth: 0
    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        enable-cache: true
    - name: Build
      run: |
        set -o pipefail
        uv run jupyter-book build kempner_computing_handbook 2>&1 | tee build.log
        if grep -q "WARNING: " build.log; then
          echo "::error ::Build produced warnings"
          exit 1
        fi
    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: book
        path: kempner_computing_handbook/_build/html
