title: Kempner Institute Computing Handbook
copyright: " 2026, The President and Fellows of Harvard College"
author: Kempner Institute
logo: figures/svg/Kempner-logo_Full-Color-Full-Name-Harvard.svg
execute:
  execute_notebooks: force

latex:
  latex_documents:
    targetname: book.tex

bibtex_bibfiles:
  - references.bib

repository:
  url: https://github.com/KempnerInstitute/kempner-computing-handbook
  path: kempner_computing_handbook
  branch: main

# extra_files:
#   - files/**

html:
  favicon: figures/png/kempner_favicon.png
  use_issues_button: true
  use_repository_button: true
  extra_css:
    - _static/custom.css
  extra_js:
    - _static/custom.js
  analytics:
    google_analytics_id: G-QFZEXWFW26
  extra_static_paths: 
   - _static

exclude_patterns:
  - _build
  - .DS_Store
  - scalability/distributed_computing.md
  - s9_workshops_and_trainings/workshops/*
  - s9_workshops_and_trainings/intro_to_hpc/*
  - s5_ai_scaling_and_engineering/scalability/distributed_computing.md

# Disable fuzzy (schemeless) autolinking so text like "coverage.py" is not
# turned into a link (".py" etc. are real TLDs). Full URLs and explicit
# [text](url) links are unaffected.
sphinx:
  extra_extensions:
    - sphinxext.opengraph
    - sphinx_sitemap
    - sphinxcontrib.mermaid
    - sphinx_last_updated_by_git
  config:
    myst_linkify_fuzzy_links: false
    html_baseurl: https://handbook.eng.kempnerinstitute.harvard.edu/
    ogp_site_url: https://handbook.eng.kempnerinstitute.harvard.edu/
    ogp_site_name: Kempner Institute Computing Handbook
    sitemap_url_scheme: "{link}"
    mermaid_version: "11.12.1"
