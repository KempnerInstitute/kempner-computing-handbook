title: Kempner Institute Computing Handbook
copyright: " 2026, The President and Fellows of Harvard College"
author: Kempner Institute
logo: figures/svg/Kempner-logo_Full-Color-Full-Name-Harvard.svg
execute:
  execute_notebooks: force

latex:
  latex_documents:
    targetname: book.tex

bibtex_bibfiles:
  - references.bib

repository:
  url: https://github.com/KempnerInstitute/kempner-computing-handbook
  path: kempner_computing_handbook
  branch: main

# extra_files:
#   - files/**

html:
  favicon: figures/png/kempner_favicon.png
  use_issues_button: true
  use_repository_button: true
  extra_css:
    - _static/custom.css
  extra_js:
    - _static/custom.js
  analytics:
    google_analytics_id: G-QFZEXWFW26
  extra_static_paths: 
   - _static

exclude_patterns:
  - _build
  - .DS_Store
  - scalability/distributed_computing.md
  - s9_workshops_and_trainings/workshops/*
  - s9_workshops_and_trainings/intro_to_hpc/*
  - s5_ai_scaling_and_engineering/scalability/distributed_computing.md

# Disable fuzzy (schemeless) autolinking so text like "coverage.py" is not
# turned into a link (".py" etc. are real TLDs). Full URLs and explicit
# [text](url) links are unaffected.
sphinx:
  extra_extensions:
    - sphinxext.opengraph
    - sphinx_sitemap
    - sphinxcontrib.mermaid
    - sphinx_last_updated_by_git
    - ablog
  config:
    myst_linkify_fuzzy_links: false
    html_baseurl: https://handbook.eng.kempnerinstitute.harvard.edu/
    ogp_site_url: https://handbook.eng.kempnerinstitute.harvard.edu/
    ogp_site_name: Kempner Institute Computing Handbook
    sitemap_url_scheme: "{link}"
    mermaid_version: "11.12.1"
    # Link checking (run via: jupyter-book build ... --builder linkcheck).
    linkcheck_anchors: false
    linkcheck_retries: 2
    linkcheck_timeout: 30
    linkcheck_allowed_redirects:
      '.*': '.*'
    linkcheck_ignore:
      # Harvard-internal hosts that do not resolve or negotiate TLS off-network.
      - 'https?://vdi\.rc\.fas\.harvard\.edu'
      - 'https?://vpn\.rc\.fas\.harvard\.edu'
      # Hosts that block automated requests (work fine in a browser).
      - 'https?://(www\.)?huit\.harvard\.edu'
      - 'https?://(www\.)?dataverse\.org'
      - 'https?://(www\.)?acm\.org'
      - 'https?://(www\.)?dvc\.org'
      - 'https?://wiki\.lustre\.org'
    blog_path: "technical_blog/README"
    blog_default_author: max_shad
    blog_authors:
      max_shad:
        - Max Shad
        - https://kempnerinstitute.harvard.edu/people/our-people/max-shad/
      yasin_mazloumi:
        - Yasin Mazloumi
        - https://kempnerinstitute.harvard.edu/people/our-people/abbas-mazloumi/
